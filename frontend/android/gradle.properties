# Keep Gradle's heap small: this machine has 8 GB RAM total and must also
# fit the Android emulator during development.
org.gradle.jvmargs=-Xmx1536m -XX:MaxMetaspaceSize=512m -XX:+HeapDumpOnOutOfMemoryError
android.useAndroidX=true
