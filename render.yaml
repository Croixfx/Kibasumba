services:
  - type: web
    name: kibasumba-backend
    runtime: python
    plan: free
    rootDir: backend
    buildCommand: pip install -r requirements.txt && python manage.py collectstatic --noinput && python manage.py migrate
    startCommand: gunicorn kibasumba_backend.wsgi:application --bind 0.0.0.0:$PORT
    healthCheckPath: /healthz
    envVars:
      - key: PYTHON_VERSION
        value: 3.13.1
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "false"
      # Neon Postgres connection string (provisioned via Vercel Marketplace,
      # project neon-cyan-pebble) — entered in the Render dashboard.
      - key: DATABASE_URL
        sync: false
      - key: SMS_BACKEND
        value: twilio
      # Twilio credentials are entered in the Render dashboard, never committed.
      - key: TWILIO_ACCOUNT_SID
        sync: false
      - key: TWILIO_AUTH_TOKEN
        sync: false
      - key: TWILIO_FROM_NUMBER
        sync: false
